<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>خطة البيع الشهرية</title>
  <style>
    body{font-family:Tahoma,Arial,sans-serif;background:#f6f8fb;margin:0;padding:24px}
    .card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
    .row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
    input,select,button{padding:10px;border:1px solid #d0d7e2;border-radius:8px}
    table{width:100%;border-collapse:collapse;background:#fff}
    th,td{border:1px solid #e5e9f2;padding:10px;text-align:right}
    .actions{display:flex;gap:8px;margin-top:12px}
  </style>
</head>
<body>
  <div class="card">
    <h2>خطة البيع الشهرية</h2>
    <div class="row">
      <input type="month" />
      <select><option>كل المجموعات</option></select>
      <select><option>كل المواد</option></select>
      <select><option>الحالة</option><option>Draft</option><option>Pending</option><option>Approved</option><option>Locked</option></select>
    </div>

    <table>
      <thead>
        <tr>
          <th>المجموعة</th>
          <th>المادة</th>
          <th>معدل البيع</th>
          <th>كمية الخطة</th>
          <th>الحالة</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>حليب</td>
          <td>حليب كامل الدسم</td>
          <td>1200</td>
          <td><input type="number" value="1260" /></td>
          <td>Draft</td>
        </tr>
      </tbody>
    </table>

    <div class="actions">
      <button>حفظ مسودة</button>
      <button>إرسال للموافقة</button>
      <button>موافقة على سطر</button>
      <button>موافقة على الكل</button>
    </div>
  </div>
</body>
</html>
